        // ============ FUNCTIONS ============
        function handleLogin(e) {
            e.preventDefault();
            loginError = '';

                render();

        // Quick Note Functions
        function saveNote(e) {
            e.preventDefault();
            const noteData = {
                id: Date.now(),
                userId: currentUser.id,
                date: new Date().toISOString(),
                product: document.getElementById('productName')?.value || '',
                npp: document.getElementById('npp')?.value || '',
                volume: document.getElementById('volume')?.value || '',
                hinhThucVC: document.getElementById('hinhThucVC')?.value || '',
                giaMua: document.getElementById('giaMua')?.value || '',
                chiPhi: document.getElementById('chiPhi')?.value || '',
                giaBan: document.getElementById('giaBan')?.value || '',
                status: document.getElementById('status')?.value || '',

            };
            notes.push(noteData);
            localStorage.setItem('notes', JSON.stringify(notes));
            alert('✅ Ghi chú đã lưu!');
            render();
        }

        // Photo Functions
        function capturePhoto() {
            document.getElementById('photoInput').click();
        }

        function handlePhotoSelect(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const photoData = {
                        id: Date.now(),
                        userId: currentUser.id,
                        date: new Date().toISOString(),
                        data: event.target.result,
                        location: document.getElementById('photoLocation')?.value || 'Unknown',
                    };
                    photos.push(photoData);
                    localStorage.setItem('photos', JSON.stringify(photos));
                    alert('✅ Ảnh đã lưu!');
                    render();
                };
                reader.readAsDataURL(file);
            }
        }

        // GPS Check-in
        function checkInGPS() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    const visit = {
                        id: Date.now(),
                        userId: currentUser.id,
                        date: new Date().toISOString(),
                        latitude: lat,
                        longitude: lng,
                        customerName: document.getElementById('customerName')?.value || 'Unknown',
                        address: document.getElementById('customerAddress')?.value || 'Unknown',
                    };
                    visits.push(visit);
                    localStorage.setItem('visits', JSON.stringify(visits));
                    alert(`✅ Check-in thành công!\nVị trí: ${lat.toFixed(4)}, ${lng.toFixed(4)}`);
                    render();
                });
            } else {
                alert('❌ Browser không hỗ trợ GPS!');
            }
        }

        // Excel Export
        function exportToExcel() {
            const data = [];
            notes.filter(n => n.userId === currentUser.id).forEach(note => {
                data.push({
                    'Ngày': new Date(note.date).toLocaleDateString('vi-VN'),
                    'Sản phẩm': note.product,
                    'NPP': note.npp,
                    'Volume': note.volume,
                    'Hình thức VC': note.hinhThucVC,
                    'Giá mua': note.giaMua,
                    'Chi phí': note.chiPhi,
                    'Giá bán': note.giaBan,
                    'Trạng thái': note.status,
                    'Ghi chú': note.ghiChu,
                });
            });
            
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Notes');
            XLSX.writeFile(wb, `sales-notes-${new Date().toISOString().split('T')[0]}.xlsx`);
        }

        // Import Excel
        function importFromExcel(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const workbook = XLSX.read(event.target.result, { type: 'binary' });
                    const sheet = workbook.Sheets[workbook.SheetNames[0]];
                    const data = XLSX.utils.sheet_to_json(sheet);
                    
                    data.forEach(row => {
                        const noteData = {
                            id: Date.now() + Math.random(),
                            userId: currentUser.id,
                            date: new Date().toISOString(),
                            product: row['Sản phẩm'] || '',
                            npp: row['NPP'] || '',
                            volume: row['Volume'] || '',
                            hinhThucVC: row['Hình thức VC'] || '',
                            giaMua: row['Giá mua'] || '',
                            chiPhi: row['Chi phí'] || '',
                            giaBan: row['Giá bán'] || '',
                            status: row['Trạng thái'] || '',
                            ghiChu: row['Ghi chú'] || '',
                        };
                        notes.push(noteData);
                    });
                    localStorage.setItem('notes', JSON.stringify(notes));
                    alert(`✅ Nhập ${data.length} dòng thành công!`);
                    render();
                };
                reader.readAsBinaryString(file);
            }
        }

        // Calendar
        function getCalendarDays(year, month) {
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const daysInMonth = lastDay.getDate();
            const startingDayOfWeek = firstDay.getDay();
            
            const days = [];
            for (let i = 0; i < startingDayOfWeek; i++) days.push(null);
            for (let i = 1; i <= daysInMonth; i++) days.push(i);
            return days;
        }

        function hasVisitOnDay(day, month, year) {
            return visits.some(v => {
                const vDate = new Date(v.date);
                return vDate.getDate() === day && 
                       vDate.getMonth() === month && 
                       vDate.getFullYear() === year &&
                       v.userId === currentUser.id;
            });
        }

                if (activeTab === 'map') setTimeout(initMap, 100);

                                            <div class="bg-white/5 border border-white/10 rounded-lg overflow-hidden">
                                                <img src="${photo.data}" alt="Photo" class="w-full h-24 object-cover" />
                                                <p class="text-orange-300 text-xs p-2">${photo.location}</p>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            } else if (activeTab === 'checkin') {
                return `
                    <div>
                        <h2 class="text-3xl font-bold text-white mb-8">📍 Check-in GPS</h2>
                        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            <div>
                                <div class="bg-white/10 rounded-2xl border border-white/20 p-6">
                                    <input type="text" id="customerName" placeholder="Tên khách" class="w-full bg-white/5 border border-white/20 rounded-lg px-3 py-2 text-white placeholder-white/40 text-sm mb-3" />
                                    <input type="text" id="customerAddress" placeholder="Địa chỉ" class="w-full bg-white/5 border border-white/20 rounded-lg px-3 py-2 text-white placeholder-white/40 text-sm mb-3" />
                                    <button onclick="checkInGPS()" class="w-full bg-gradient-to-r from-orange-500 to-amber-500 text-white font-semibold py-2 rounded-lg text-sm">📍 Check-in</button>
                                </div>
                            </div>
                            <div class="lg:col-span-2">
                                <div class="bg-white/10 rounded-2xl border border-white/20 p-6">
                                    <h3 class="text-white font-bold mb-4">Danh Sách Check-in</h3>
                                    <div class="space-y-2 max-h-96 overflow-y-auto">
                                        ${visits.filter(v => v.userId === currentUser.id).reverse().slice(0, 10).map(visit => `
                                            <div class="bg-white/5 border border-white/10 rounded-lg p-2">
                                                <p class="text-white font-bold text-sm">${visit.customerName}</p>
                                                <p class="text-orange-300 text-xs">📍 ${visit.latitude.toFixed(4)}, ${visit.longitude.toFixed(4)}</p>
                                                <p class="text-amber-200/60 text-xs">${new Date(visit.date).toLocaleTimeString('vi-VN')}</p>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            } else if (activeTab === 'map') {
                return `
                    <div>
                        <h2 class="text-3xl font-bold text-white mb-8">🗺️ Bản Đồ</h2>
                        <div class="bg-white/10 rounded-2xl border border-white/20 p-6">
                            <div id="map"></div>
                        </div>
                    </div>
                `;
            } else if (activeTab === 'data') {
                return `
                    <div>
                        <h2 class="text-3xl font-bold text-white mb-8">📤 Data</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="bg-white/10 rounded-2xl border border-white/20 p-6">
                                <h3 class="text-white font-bold mb-4">📥 Nhập Excel</h3>
                                <button onclick="document.getElementById('excelInput').click()" class="w-full bg-green-500 text-white font-semibold py-3 rounded-lg">📥 Chọn File</button>
                            </div>
                            <div class="bg-white/10 rounded-2xl border border-white/20 p-6">
                                <h3 class="text-white font-bold mb-4">📤 Xuất Excel</h3>
                                <button onclick="exportToExcel()" class="w-full bg-gradient-to-r from-orange-500 to-amber-500 text-white font-semibold py-3 rounded-lg">📤 Xuất</button>
                            </div>
                        </div>
                    </div>
                `;
            } else if (activeTab === 'calendar') {
                const today = new Date();
                const days = getCalendarDays(today.getFullYear(), today.getMonth());
                return `
                    <div>
                        <h2 class="text-3xl font-bold text-white mb-8">📅 Lịch Tháng ${today.getMonth() + 1}</h2>
                        <div class="bg-white/10 rounded-2xl border border-white/20 p-6">
                            <div class="grid grid-cols-7 gap-2 mb-4">
                                ${['CN', 'T2', 'T3', 'T4', 'T5', 'T6', 'T7'].map(d => `<div class="text-center text-orange-300 font-bold py-2">${d}</div>`).join('')}
                            </div>
                            <div class="calendar-grid">
                                ${days.map(day => {
                                    if (!day) return '<div class="calendar-day"></div>';
                                    const isToday = day === today.getDate();
                                    const hasVisit = hasVisitOnDay(day, today.getMonth(), today.getFullYear());
                                    return `<div class="calendar-day ${isToday ? 'today' : hasVisit ? 'visited' : 'bg-white/5'}"><div class="font-bold">${day}</div>${hasVisit ? '<div class="text-xs">✅</div>' : ''}</div>`;
                                }).join('')}
                            </div>
                        </div>
                    </div>
                `;
            } else if (activeTab === 'staff' && currentUser.role === 'admin') {
                return `
                    <div>
                        <h2 class="text-3xl font-bold text-white mb-8">👥 Nhân Viên (40)</h2>
                        <div class="space-y-4">
                            <div>
                                <h3 class="text-xl font-bold text-orange-400 mb-3">🟠 Admin (2)</h3>
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                                    ${validUsers.filter(u => u.role === 'admin').map(u => `
                                        <div class="bg-white/10 border border-white/20 rounded-lg p-4">
                                            <p class="text-white font-bold">${u.name}</p>
                                            <p class="text-orange-300 text-sm">${u.email}</p>
                                            <p class="text-amber-200/60 text-sm">${u.phone}</p>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                            <div>
                                <h3 class="text-xl font-bold text-amber-400 mb-3">🟡 Sales Admin (8)</h3>
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                                    ${validUsers.filter(u => u.role === 'salesadmin').map(u => `
                                        <div class="bg-white/10 border border-white/20 rounded-lg p-4">
                                            <p class="text-white font-bold">${u.name}</p>
                                            <p class="text-amber-300 text-sm">${u.email}</p>
                                            <p class="text-amber-200/60 text-sm">${u.phone}</p>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                            <div>
                                <h3 class="text-xl font-bold text-orange-400 mb-3">🟡 Sales Staff (30)</h3>
                                <div class="grid grid-cols-1 md:grid-cols-3 gap-3 max-h-96 overflow-y-auto">
                                    ${validUsers.filter(u => u.role === 'salesstaff').map(u => `
                                        <div class="bg-white/10 border border-white/20 rounded-lg p-3">
                                            <p class="text-white font-bold text-sm">${u.name}</p>
                                            <p class="text-orange-300 text-xs">${u.email}</p>
                                            <p class="text-amber-200/60 text-xs">${u.phone}</p>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }
        }

        function initMap() {
            const map = L.map('map').setView([10.7769, 106.7009], 12);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            visits.filter(v => v.userId === currentUser.id).forEach(visit => {
                L.circleMarker([visit.latitude, visit.longitude], {
                    radius: 8,
                    fillColor: "#ff9500",
                    color: "#fbbf24",
                    weight: 2,
                    opacity: 1,
                    fillOpacity: 0.8
                }).bindPopup(`<b>${visit.customerName}</b><br>${visit.address}`).addTo(map);
            });
        }

        // Initialize
        render();
    </script>
</body>
</html>
